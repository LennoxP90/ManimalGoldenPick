<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Golden Ice Pick Leaderboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0e1014;
      --panel: #181b22;
      --text: #e8eaed;
      --dim: #9aa0a6;
      --gold: #ffd982;
      --row: #1f242d;
      --row-alt: #1a1f27;
    }
    html, body { background: var(--bg); color: var(--text); margin: 0; padding: 0;
                 font-family: ui-monospace, Menlo, Consolas, monospace; }
    header { padding: 28px 24px 16px; border-bottom: 1px solid #2a2f38; }
    h1 { margin: 0; font-size: 22px; color: var(--gold); letter-spacing: 0.5px; }
    .sub { margin-top: 4px; font-size: 12px; color: var(--dim); }
    .container { max-width: 1100px; margin: 0 auto; padding: 16px 24px 48px; }
    table { width: 100%; border-collapse: collapse; margin-top: 14px; background: var(--panel); border-radius: 6px; overflow: hidden; }
    th, td { padding: 10px 14px; text-align: left; font-size: 13px; }
    th { background: #20242c; color: var(--dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; font-size: 11px; }
    tr:nth-child(even) td { background: var(--row-alt); }
    tr:nth-child(odd)  td { background: var(--row); }
    td.kills { font-weight: 700; color: var(--gold); text-align: right; font-variant-numeric: tabular-nums; }
    td.num { color: var(--dim); font-variant-numeric: tabular-nums; }
    td.name { font-weight: 600; }
    td.owner { color: #b8e0ff; }
    .swatch { display: inline-block; width: 14px; height: 14px; border-radius: 3px; border: 1px solid #00000040; vertical-align: middle; margin-right: 6px; }
    .desc { color: var(--dim); font-size: 11px; margin-top: 2px; }
    .pid { color: #555a64; font-size: 10px; font-family: ui-monospace, monospace; }
    .empty { padding: 28px; text-align: center; color: var(--dim); }
    .meta { display: flex; gap: 12px; align-items: center; font-size: 12px; color: var(--dim); margin-top: 4px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #4a4f58; }
    .dot.live { background: #4ec1a0; }
    a.refresh { color: var(--gold); cursor: pointer; text-decoration: none; }
    a.refresh:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>⛏ Golden Ice Pick Leaderboard</h1>
    <div class="sub">every authored pick in circulation, ranked by confirmed kills.</div>
    <div class="meta">
      <span class="dot" id="status-dot"></span>
      <span id="status-text">loading...</span>
      <span>·</span>
      <a class="refresh" id="refresh">refresh</a>
    </div>
  </header>

  <div class="container">
    <table id="board" style="display:none;">
      <thead>
        <tr>
          <th>#</th>
          <th>Pick</th>
          <th>Owner</th>
          <th style="text-align:right">Kills</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none;">No picks in circulation yet.</div>
  </div>

<script>
  // sanitize untrusted strings before injecting into innerHTML — admins author custom names
  // through a form and we cant assume someone didnt try <script> shenanigans.
  const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));

  // mirrors SheenColors.ForItemId on the client — SAME palette + SAME (h*31 + char) rolling
  // hash so a crate-derived pick shows the EXACT color here that it shows in-game. C# uses
  // 32-bit int math (wraps at 2^31); JS numbers are doubles, so we |0 each step to truncate.
  const PALETTE = ['#28FF46','#F2AC0A','#FF1EFF','#FF4B05','#64FF0A','#C8140F','#2862C8','#6914FF'];
  function hashSheenColor(itemId) {
    if (!itemId) return PALETTE[0];
    let h = 0;
    for (let i = 0; i < itemId.length; i++) h = (h * 31 + itemId.charCodeAt(i)) | 0;
    const n = PALETTE.length;
    return PALETTE[((h % n) + n) % n];
  }

  // This page is served by the mod's own embedded web server (LeaderboardWebServer), which
  // also exposes the JSON at `/leaderboard` on the SAME origin — so a plain relative GET works
  // with no host/port to hardcode and no cross-origin/CORS concern.
  async function load() {
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    dot.classList.remove('live');
    txt.textContent = 'loading...';
    try {
      const resp = await fetch('/leaderboard', { cache: 'no-store' });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      render(data.picks || []);
      dot.classList.add('live');
      txt.textContent = `${data.picks?.length ?? 0} picks · updated ${new Date().toLocaleTimeString()}`;
    } catch (e) {
      txt.textContent = `error: ${e.message}`;
    }
  }

  function render(picks) {
    const board = document.getElementById('board');
    const empty = document.getElementById('empty');
    const rows = document.getElementById('rows');
    if (picks.length === 0) {
      board.style.display = 'none';
      empty.style.display = 'block';
      return;
    }
    board.style.display = '';
    empty.style.display = 'none';

    rows.innerHTML = picks.map((p, i) => {
      // authored color wins; otherwise compute the same deterministic hash color the in-game
      // client uses. result: every pick has a real swatch matching whats actually rendered.
      const swatchColor = p.sheenColorHex || hashSheenColor(p.pickId);
      const swatch = `<span class="swatch" style="background:${esc(swatchColor)}"></span>`;
      const name = esc(p.customName || 'GoldenPick');
      const num  = p.pickNumber != null ? `<span class="num">#${esc(p.pickNumber)}</span>` : '';
      const desc = p.customDescription
        ? `<div class="desc">${esc(p.customDescription)}</div>`
        : '';
      const pid = `<div class="pid">${esc(p.pickId)}</div>`;
      return `<tr>
        <td class="num">${i + 1}</td>
        <td class="name">${swatch}${name} ${num}${desc}${pid}</td>
        <td class="owner">${esc(p.ownerNickname)}</td>
        <td class="kills">${esc(p.killCount)}</td>
      </tr>`;
    }).join('');
  }

  document.getElementById('refresh').addEventListener('click', load);
  load();
  // light auto-refresh — board changes are rare enough that 30s feels live without hammering.
  setInterval(load, 30000);
</script>
</body>
</html>
